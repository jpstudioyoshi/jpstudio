<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Japanese Studio — Dev</title>
<style>
  :root {
    --ink:        #f5f5f7;
    --ink-light:  #c0c0c5;
    --paper:      #1c1c1e;
    --paper-dark: #141416;
    --border:     rgba(255,255,255,0.1);
    --field:      #2c2c2e;
    --field-border:#3a3a3c;
    --teal:       #30d5c8;
    --gold:       #ffd60a;
    --red:        #ff453a;
    --ui:         -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--paper-dark);
    color: var(--ink);
    font-family: var(--ui);
    font-size: 14px;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Top bar ── */
  #topbar {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 16px;
    background: var(--paper);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  #topbar h1 { font-size: 0.88rem; font-weight: 600; color: var(--ink); letter-spacing: 0.04em; }
  .tab-btn {
    padding: 5px 14px;
    background: none;
    border: 1px solid var(--border);
    border-radius: 5px;
    color: var(--ink-light);
    font-family: var(--ui);
    font-size: 0.78rem;
    cursor: pointer;
  }
  .tab-btn.active { border-color: var(--teal); color: var(--teal); }
  .tab-btn:hover:not(.active) { border-color: var(--ink-light); color: var(--ink); }
  #reloadBtn {
    margin-left: auto;
    padding: 5px 14px;
    background: none;
    border: 1px solid var(--gold);
    border-radius: 5px;
    color: var(--gold);
    font-family: var(--ui);
    font-size: 0.78rem;
    cursor: pointer;
  }
  #reloadBtn:hover { background: var(--gold); color: var(--paper); }

  /* ── Main layout ── */
  #main { display: flex; flex: 1; overflow: hidden; }

  /* ── Left: issue inbox ── */
  #sidebar {
    width: 340px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    border-right: 1px solid var(--border);
    overflow: hidden;
  }
  #sidebar-header {
    padding: 12px 14px 8px;
    font-size: 0.68rem;
    letter-spacing: 0.08em;
    color: var(--ink-light);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  #quick-add {
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  #quick-add textarea {
    width: 100%;
    padding: 8px 10px;
    background: var(--field);
    border: 1px solid var(--field-border);
    border-radius: 5px;
    color: var(--ink);
    font-family: var(--ui);
    font-size: 0.82rem;
    resize: none;
    outline: none;
    line-height: 1.5;
  }
  #quick-add textarea:focus { border-color: var(--teal); }
  #quick-add-row {
    display: flex;
    gap: 6px;
    margin-top: 6px;
    align-items: center;
  }
  #quick-add-row select {
    padding: 4px 8px;
    background: var(--field);
    border: 1px solid var(--field-border);
    border-radius: 4px;
    color: var(--ink);
    font-family: var(--ui);
    font-size: 0.75rem;
  }
  .btn-add {
    padding: 5px 14px;
    background: var(--teal);
    border: none;
    border-radius: 5px;
    color: var(--paper);
    font-family: var(--ui);
    font-size: 0.78rem;
    font-weight: 600;
    cursor: pointer;
    margin-left: auto;
  }
  .btn-add:hover { opacity: 0.85; }

  #issue-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
  }
  .issue-item {
    padding: 9px 10px;
    border: 1px solid var(--border);
    border-radius: 6px;
    margin-bottom: 6px;
    cursor: pointer;
    display: flex;
    gap: 8px;
    align-items: flex-start;
  }
  .issue-item:hover { border-color: var(--ink-light); }
  .issue-item.selected { border-color: var(--teal); background: rgba(48,213,200,0.05); }
  .issue-item input[type=checkbox] { margin-top: 2px; flex-shrink: 0; accent-color: var(--teal); }
  .issue-title { font-size: 0.82rem; color: var(--ink); line-height: 1.4; flex: 1; }
  .issue-meta { display: flex; gap: 6px; margin-top: 4px; flex-wrap: wrap; }
  .issue-tag {
    font-size: 0.65rem;
    padding: 1px 6px;
    border-radius: 3px;
    border: 1px solid currentColor;
    opacity: 0.8;
  }

  #group-bar {
    display: none;
    padding: 8px 12px;
    background: rgba(48,213,200,0.08);
    border-top: 1px solid rgba(48,213,200,0.2);
    gap: 8px;
    align-items: center;
    flex-shrink: 0;
  }
  #group-bar span { font-size: 0.78rem; color: var(--ink); }
  .btn-ghost-sm {
    padding: 4px 10px;
    background: none;
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--ink-light);
    font-family: var(--ui);
    font-size: 0.72rem;
    cursor: pointer;
  }
  .btn-ghost-sm:hover { border-color: var(--ink); color: var(--ink); }
  .btn-teal-sm {
    padding: 4px 10px;
    background: none;
    border: 1px solid var(--teal);
    border-radius: 4px;
    color: var(--teal);
    font-family: var(--ui);
    font-size: 0.72rem;
    cursor: pointer;
  }
  .btn-teal-sm:hover { background: var(--teal); color: var(--paper); }

  /* ── Right: chat panel ── */
  #chat-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  #chat-header {
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
    min-height: 44px;
  }
  #chat-title { font-size: 0.82rem; color: var(--ink-light); flex: 1; }
  #files-loaded {
    font-size: 0.7rem;
    color: var(--ink-light);
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  .file-chip {
    padding: 2px 7px;
    background: var(--field);
    border: 1px solid var(--field-border);
    border-radius: 3px;
    font-size: 0.65rem;
    color: var(--ink-light);
    cursor: pointer;
  }
  .file-chip:hover { border-color: var(--red); color: var(--red); }

  #thread {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .msg {
    max-width: 85%;
    padding: 10px 14px;
    border-radius: 8px;
    font-size: 0.84rem;
    line-height: 1.6;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .msg.user {
    align-self: flex-end;
    background: rgba(48,213,200,0.12);
    border: 1px solid rgba(48,213,200,0.2);
  }
  .msg.assistant {
    align-self: flex-start;
    background: var(--paper);
    border: 1px solid var(--border);
  }
  .msg.system {
    align-self: center;
    background: none;
    border: none;
    color: var(--ink-light);
    font-size: 0.75rem;
    text-align: center;
    max-width: 100%;
  }

  /* Diff view */
  .diff-block {
    background: var(--paper-dark);
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
    margin: 8px 0;
    font-size: 0.78rem;
  }
  .diff-header {
    padding: 6px 12px;
    background: var(--field);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .diff-filename { font-size: 0.72rem; color: var(--teal); font-family: monospace; }
  .diff-apply {
    padding: 3px 10px;
    background: none;
    border: 1px solid var(--teal);
    border-radius: 4px;
    color: var(--teal);
    font-size: 0.7rem;
    cursor: pointer;
  }
  .diff-apply:hover { background: var(--teal); color: var(--paper); }
  .diff-apply.applied { border-color: var(--ink-light); color: var(--ink-light); cursor: default; }
  .diff-body {
    padding: 10px 12px;
    font-family: 'SF Mono', Consolas, monospace;
    font-size: 0.75rem;
    line-height: 1.5;
    overflow-x: auto;
    max-height: 300px;
    overflow-y: auto;
  }
  .diff-add { color: #34c759; }
  .diff-remove { color: var(--red); opacity: 0.8; }
  .diff-context { color: var(--ink-light); }

  #chat-input-area {
    padding: 10px 14px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 8px;
    align-items: flex-end;
    flex-shrink: 0;
  }
  #chat-input {
    flex: 1;
    padding: 8px 12px;
    background: var(--field);
    border: 1px solid var(--field-border);
    border-radius: 6px;
    color: var(--ink);
    font-family: var(--ui);
    font-size: 0.84rem;
    resize: none;
    outline: none;
    min-height: 36px;
    max-height: 120px;
    line-height: 1.4;
  }
  #chat-input:focus { border-color: var(--teal); }
  #send-btn {
    padding: 8px 16px;
    background: var(--teal);
    border: none;
    border-radius: 6px;
    color: var(--paper);
    font-family: var(--ui);
    font-size: 0.82rem;
    font-weight: 600;
    cursor: pointer;
    flex-shrink: 0;
  }
  #send-btn:hover { opacity: 0.85; }
  #send-btn:disabled { opacity: 0.4; cursor: default; }

  /* File picker modal */
  #file-modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }
  #file-modal.open { display: flex; }
  #file-modal-inner {
    background: var(--paper);
    border: 1px solid var(--border);
    border-radius: 10px;
    width: min(560px, 90vw);
    max-height: 70vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  #file-modal-inner h2 {
    padding: 14px 16px;
    font-size: 0.88rem;
    border-bottom: 1px solid var(--border);
  }
  #file-search {
    padding: 8px 12px;
    background: var(--field);
    border: none;
    border-bottom: 1px solid var(--border);
    color: var(--ink);
    font-family: var(--ui);
    font-size: 0.82rem;
    outline: none;
    width: 100%;
  }
  #file-tree {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
  }
  .file-entry {
    padding: 5px 10px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 0.78rem;
    color: var(--ink-light);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .file-entry:hover { background: var(--field); color: var(--ink); }
  .file-entry.dir { color: var(--ink-light); opacity: 0.7; cursor: default; }
  .file-entry.dir:hover { background: none; }
  #file-modal-close {
    padding: 10px 16px;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: flex-end;
  }

  /* Placeholder */
  #empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    flex: 1;
    color: var(--ink-light);
    gap: 8px;
    text-align: center;
    padding: 40px;
  }
  #empty-state p { font-size: 0.82rem; line-height: 1.6; max-width: 360px; }

  /* Scrollbars */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 3px; }
</style>
</head>
<body>

<!-- Top bar -->
<div id="topbar">
  <h1>🔧 Dev</h1>
  <button class="tab-btn active" onclick="setMode('fix')" id="tabFix">Fix / Build</button>
  <button class="tab-btn" onclick="setMode('triage')" id="tabTriage">Triage batch</button>
  <button class="tab-btn" onclick="runAudit()" id="tabAudit">🔍 Audit</button>
  <button id="checkBtn" onclick="runCheckSyntax()" style="margin-left:auto;padding:5px 14px;background:none;border:1px solid var(--teal);border-radius:5px;color:var(--teal);font-family:var(--ui);font-size:0.78rem;cursor:pointer">⚙ check-syntax</button>
  <button id="reloadBtn" onclick="reloadMain()" style="padding:5px 14px;background:none;border:1px solid var(--gold);border-radius:5px;color:var(--gold);font-family:var(--ui);font-size:0.78rem;cursor:pointer">↺ Reload app</button>
</div>

<!-- Main layout -->
<div id="main">

  <!-- Left: issue list -->
  <div id="sidebar">
    <div id="sidebar-header">ISSUES — click to work on, ✓ to batch</div>

    <div id="quick-add">
      <textarea id="quickInput" rows="2" placeholder="Describe a bug or feature…" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();quickAdd()}"></textarea>
      <div id="quick-add-row">
        <select id="quickType">
          <option value="bug">🐛 Bug</option>
          <option value="feature">✨ Feature</option>
          <option value="improvement">🔧 Improvement</option>
        </select>
        <select id="quickPriority">
          <option value="low">Low</option>
          <option value="medium" selected>Medium</option>
          <option value="high">High</option>
        </select>
        <button class="btn-add" onclick="quickAdd()">+ Add</button>
      </div>
    </div>

    <div id="issue-list"></div>

    <div id="group-bar">
      <span id="group-count">0 selected</span>
      <button class="btn-teal-sm" onclick="triageSelected()">Triage selected</button>
      <button class="btn-ghost-sm" onclick="clearSelection()">✕</button>
    </div>
  </div>

  <!-- Right: chat -->
  <div id="chat-panel">
    <div id="chat-header">
      <span id="chat-title">Select an issue to start</span>
      <div id="files-loaded"></div>
      <button class="btn-ghost-sm" onclick="openFilePicker()" title="Add files to context">+ files</button>
    </div>

    <div id="thread">
      <div id="empty-state">
        <p>Pick an issue from the left to start a fix session, or add a new one above.<br><br>Files from the project are loaded automatically based on context. Add more with <strong>+ files</strong>.</p>
      </div>
    </div>

    <div id="apply-all-bar" style="display:none;padding:8px 16px;background:var(--paper-dark);border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:12px"></div>
    <div id="chat-input-area">
      <textarea id="chat-input" placeholder="Message…" rows="1"
        onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage()}"
        oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'"></textarea>
      <button id="send-btn" onclick="sendMessage()">Send</button>
    </div>
  </div>
</div>

<!-- File picker modal -->
<div id="file-modal">
  <div id="file-modal-inner">
    <h2>Add files to context</h2>
    <input id="file-search" placeholder="Filter files…" oninput="renderFileTree(this.value)">
    <div id="file-tree"></div>
    <div id="file-modal-close">
      <button class="btn-ghost-sm" onclick="closeFilePicker()">Done</button>
    </div>
  </div>
</div>

<script>
  // Load management modules sequentially with cache busters
  var _v = Date.now();
  var _modules = ['node_modules/diff/dist/diff.js', 'management-state.js', 'management-ui.js', 'management-api.js', 'management-apply.js'];
  function _loadNext(i) {
    if (i >= _modules.length) return;
    var s = document.createElement("script");
    s.src = _modules[i] + "?v=" + _v;
    s.onload = function() { _loadNext(i + 1); };
    document.head.appendChild(s);
  }
  _loadNext(0);
</script>
</body>
</html>
